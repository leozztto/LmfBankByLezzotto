apiVersion: apps/v1
kind: Deployment
metadata:
  name: lmf-bank-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lmf-bank
  template:
    metadata:
      labels:
        app: lmf-bank
    spec:

      initContainers:
        - name: wait-postgres
          image: postgres:15
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432; do
                echo waiting postgres;
                sleep 2;
              done

      containers:
        - name: lmf-bank
          image: lmf-bank:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes

            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/lmf_bank

            - name: SPRING_DATASOURCE_USERNAME
              value: postgres

            - name: SPRING_DATASOURCE_PASSWORD
              value: root

            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: org.postgresql.Driver

            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092

            - name: JWT_SECRET
              value: "minha-chave-super-secreta"